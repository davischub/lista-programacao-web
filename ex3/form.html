<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Matrícula - FATEC</title>
</head>
<body>

    <header>
        <h1>Matrícula FATEC</h1>
    </header>

    <main>
        <form action="#" method="POST">
            
            <fieldset>
                <legend>Dados Pessoais</legend>
                
                <div>
                    <label for="nome">Nome completo:</label><br>
                    <input type="text" id="nome" name="nome" required minlength="5" placeholder="Digite seu nome completo">
                </div>
                <br>

                <div>
                    <label for="email">Email:</label><br>
                    <input type="email" id="email" name="email" required placeholder="exemplo@fatec.sp.gov.br">
                </div>
                <br>

                <div>
                    <label for="data_nascimento">Data de nascimento:</label><br>
                    <input type="date" id="data_nascimento" name="data_nascimento" required>
                </div>
                <br>

                <div>
                    <label for="cpf">CPF:</label><br>
                    <input type="text" id="cpf" name="cpf" required pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" placeholder="123.456.789-00" title="Digite no formato 123.456.789-00">
                </div>
            </fieldset>
            <br>

            <fieldset>
                <legend>Dados Acadêmicos</legend>

                <div>
                    <label for="curso">Curso:</label><br>
                    <select id="curso" name="curso" required>
                        <option value="">Selecione uma opção...</option>
                        <option value="ads">Análise e Desenvolvimento de Sistemas</option>
                        <option value="gpi">Gestão da Produção Industrial</option>
                        <option value="agro">Agronegócio</option>
                    </select>
                </div>
                <br>

                <div>
                    <label>Período:</label><br>
                    <input type="radio" id="manha" name="periodo" value="manha" required>
                    <label for="manha">Manhã</label>
                    
                    <input type="radio" id="noite" name="periodo" value="noite" required>
                    <label for="noite">Noite</label>
                </div>
                <br>

                <div>
                    <input type="checkbox" id="programou" name="programou" value="sim">
                    <label for="programou">Já programou antes?</label>
                </div>
            </fieldset>
            <br>

            <fieldset>
                <legend>Informações Adicionais</legend>
                
                <div>
                    <label for="observacoes">Observações:</label><br>
                    <textarea id="observacoes" name="observacoes" rows="4" cols="50" placeholder="Digite aqui alguma observação importante..."></textarea>
                </div>
            </fieldset>
            <br>

            <button type="submit">Enviar Matrícula</button>

        </form>
    </main>

</body>
</html>
