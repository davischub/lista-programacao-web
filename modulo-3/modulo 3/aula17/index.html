<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Quiz JS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Tela 1 -->
    <div id="inicio">
      <h1>Quiz JavaScript</h1>
      <p>10 perguntas de múltipla escolha</p>
      <button id="btnIniciar">Iniciar</button>
    </div>

    <!-- Tela 2 -->
    <div id="quiz" hidden>
      <div id="progresso"></div>
      <h2 id="pergunta"></h2>
      <div id="opcoes"></div>
    </div>

    <!-- Tela 3 -->
    <div id="resultado" hidden></div>

  </div>
  <script src="script.js"></script>
</body>
</html>
