<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pokédex</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      color: white;
    }

    h1 { font-size: 2rem; margin-bottom: 24px; letter-spacing: 2px; }
    h1 span { color: #ef4444; }

    .busca {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
      width: 100%;
      max-width: 400px;
    }

    .busca input {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
    }

    .busca button {
      padding: 12px 20px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      font-weight: bold;
    }
    .busca button:hover { background: #dc2626; }

    #status { font-size: 14px; color: #aaa; margin-bottom: 16px; min-height: 20px; }

    #card {
      background: #16213e;
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 380px;
      display: none;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    #card img { width: 160px; height: 160px; image-rendering: pixelated; }

    #card h2 { font-size: 1.8rem; text-transform: capitalize; margin: 8px 0; }
    #card .numero { color: #aaa; font-size: 14px; margin-bottom: 12px; }

    .tipos { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .tipo {
      padding: 4px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      text-transform: capitalize;
      color: white;
    }

    .stats { text-align: left; }
    .stats h3 { margin-bottom: 12px; font-size: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

    .stat { margin-bottom: 10px; }
    .stat-info { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; text-transform: capitalize; }

    .barra-fundo { background: #0f3460; border-radius: 10px; height: 8px; }
    .barra { height: 8px; border-radius: 10px; transition: width 0.6s ease; }
  </style>
</head>
<body>

  <h1>Poké<span>dex</span></h1>

  <div class="busca">
    <input type="text" id="input-pokemon" placeholder="Nome ou número... (ex: pikachu)">
    <button id="btn-buscar">Buscar</button>
  </div>

  <div id="status"></div>
  <div id="card"></div>

  <script src="script.js"></script>
</body>
</html>
