<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lista de Tarefas</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; background: #f5f5f5; }
    h1 { color: #333; }

    form { display: flex; gap: 8px; margin-bottom: 16px; }
    input[type="text"] {
      flex: 1; padding: 10px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 14px;
    }
    button {
      padding: 10px 16px; border: none; border-radius: 6px;
      cursor: pointer; font-size: 14px;
    }
    #btn-adicionar { background: #3b82f6; color: white; }

    #busca { width: 100%; padding: 10px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 14px; margin-bottom: 16px; box-sizing: border-box; }

    ul { list-style: none; padding: 0; }

    li {
      display: flex; align-items: center; justify-content: space-between;
      background: white; padding: 12px 16px; border-radius: 8px;
      margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      cursor: pointer;
    }
    li.concluida span { text-decoration: line-through; color: #aaa; }

    .btn-remover {
      background: #ef4444; color: white;
      border: none; border-radius: 4px;
      padding: 4px 10px; cursor: pointer; font-size: 12px;
    }

    .oculto { display: none; }
  </style>
</head>
<body>

  <h1>✅ Lista de Tarefas</h1>

  <form id="form-tarefa">
    <input type="text" id="input-tarefa" placeholder="Nova tarefa..." required>
    <button type="submit" id="btn-adicionar">Adicionar</button>
  </form>

  <input type="text" id="busca" placeholder="🔍 Buscar tarefa...">

  <ul id="lista"></ul>

  <script src="script.js"></script>
</body>
</html>
